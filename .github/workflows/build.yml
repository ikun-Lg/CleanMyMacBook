name: Build & Deploy Pages

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App & DMG
        run: |
          APP_NAME="CleanMyMacBook"
          SCHEME="CleanMyMacBook"
          BUILD_DIR="$(pwd)/.build"

          xcodebuild \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$BUILD_DIR/derived" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            build

          DMG_STAGING="$BUILD_DIR/dmg_staging"
          DMG_OUT="$(pwd)/$APP_NAME.dmg"
          mkdir -p "$DMG_STAGING"
          cp -r "$BUILD_DIR/derived/Build/Products/Release/$APP_NAME.app" "$DMG_STAGING/$APP_NAME.app"
          ln -sf /Applications "$DMG_STAGING/Applications"
          rm -f "$DMG_OUT"
          hdiutil create -volname "$APP_NAME" -srcfolder "$DMG_STAGING" -ov -format UDZO -fs HFS+ "$DMG_OUT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanMyMacBook-dmg
          path: .

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CleanMyMacBook.dmg
          generate_release_notes: true
