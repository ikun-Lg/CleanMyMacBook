name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_VERSION=$(ls /Applications | grep 'Xcode' | sort -V | tail -1)
          echo "Using $XCODE_VERSION"
          sudo xcode-select -s "/Applications/$XCODE_VERSION/Contents/Developer"
          xcodebuild -version

      - name: Build App
        run: |
          APP_NAME="CleanMyMacBook"
          SCHEME="CleanMyMacBook"
          BUILD_DIR="$(pwd)/.build"

          xcodebuild \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$BUILD_DIR/derived" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            build

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "APP_PATH=$BUILD_DIR/derived/Build/Products/Release/$APP_NAME.app" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          APP_NAME="CleanMyMacBook"
          DMG_STAGING="${{ env.BUILD_DIR }}/dmg_staging"
          DMG_OUT="$(pwd)/${APP_NAME}.dmg"

          mkdir -p "$DMG_STAGING"
          cp -r "${{ env.APP_PATH }}" "$DMG_STAGING/$APP_NAME.app"
          ln -sf /Applications "$DMG_STAGING/Applications"

          rm -f "$DMG_OUT"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "$DMG_OUT"

          echo "DMG_PATH=$DMG_OUT" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanMyMacBook-dmg
          path: CleanMyMacBook.dmg
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: CleanMyMacBook-dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CleanMyMacBook.dmg
          draft: false
          generate_release_notes: true
